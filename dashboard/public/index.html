<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MambaHost Bot Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#1e1f22',
            foreground: '#f2f3f5',
            card: '#313338',
            'card-foreground': '#f2f3f5',
            muted: '#2b2d31',
            'muted-foreground': '#949ba4',
            accent: '#FF6F00',
            'accent-hover': '#e56500',
            'accent-dim': 'rgba(255,111,0,0.15)',
            border: '#3f4147',
            input: '#1e1f22',
            destructive: '#f23f43',
            success: '#23a559',
            discord: {
              blurple: '#5865f2',
              dark: '#2b2d31',
              text: '#dcddde',
              link: '#00a8fc',
            },
          },
          borderRadius: {
            lg: '8px',
            md: '6px',
            sm: '4px',
          },
          fontFamily: {
            brand: ['Orbitron', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- Shoelace CSS + JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

  <!-- Orbitron font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <!-- Discord preview styles -->
  <link rel="stylesheet" href="/css/discord-preview.css">

  <!-- Import map for Preact + HTM -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10",
      "preact/hooks": "https://esm.sh/preact@10/hooks",
      "htm/preact": "https://esm.sh/htm@3/preact",
      "preact-router": "https://esm.sh/preact-router@4"
    }
  }
  </script>

  <style>
    /* Base resets */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1f22;
      color: #f2f3f5;
      line-height: 1.5;
    }
    a { color: #FF6F00; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Shoelace dark theme overrides */
    :root {
      --sl-color-primary-600: #FF6F00;
      --sl-color-primary-700: #e56500;
      --sl-color-primary-500: #ff8c33;
      --sl-input-background-color: #1e1f22;
      --sl-input-border-color: #3f4147;
      --sl-input-color: #f2f3f5;
      --sl-input-placeholder-color: #949ba4;
      --sl-input-focus-ring-color: rgba(255, 111, 0, 0.4);
      --sl-panel-background-color: #313338;
      --sl-panel-border-color: #3f4147;
    }
    sl-input::part(base), sl-select::part(combobox), sl-textarea::part(base), sl-color-picker::part(base) {
      background: #1e1f22;
      border-color: #3f4147;
      color: #f2f3f5;
    }
    sl-input::part(base):focus-within, sl-select::part(combobox):focus-within, sl-textarea::part(base):focus-within {
      border-color: #FF6F00;
      box-shadow: 0 0 0 3px rgba(255, 111, 0, 0.2);
    }
    sl-select::part(listbox) {
      background: #313338;
      border-color: #3f4147;
    }
    sl-option::part(base) {
      color: #f2f3f5;
    }
    sl-option::part(base):hover {
      background: #383a40;
    }
    sl-option[aria-selected="true"]::part(base) {
      background: rgba(255,111,0,0.15);
      color: #FF6F00;
    }
    sl-switch::part(control) {
      background: #404249;
    }
    sl-switch[checked]::part(control) {
      background: #FF6F00;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
