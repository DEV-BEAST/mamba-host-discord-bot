<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MambaHost Bot Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">MambaHost</div>
      <p class="login-subtitle">Bot Dashboard</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary">Login</button>
        <div id="login-error" class="status-msg error" style="display:none"></div>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard" style="display:none">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-accent">Mamba</span>Host
      </div>
      <ul class="nav-links">
        <li><a href="#overview" class="nav-link active" data-page="overview">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          Overview
        </a></li>
        <li><a href="#embed-builder" class="nav-link" data-page="embed-builder">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/></svg>
          Embed Builder
        </a></li>
        <li><a href="#settings" class="nav-link" data-page="settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
          Settings
        </a></li>
        <li><a href="#leaderboard" class="nav-link" data-page="leaderboard">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7.5 21H2V9h5.5v12zm7.25-18h-5.5v18h5.5V3zM22 11h-5.5v10H22V11z"/></svg>
          Leaderboard
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
      </div>
    </nav>

    <!-- Content -->
    <main class="content">
      <div id="page-content"></div>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
