<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MambaHost Bot Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#1e1f22',
            foreground: '#f2f3f5',
            card: '#313338',
            'card-foreground': '#f2f3f5',
            muted: '#2b2d31',
            'muted-foreground': '#949ba4',
            'text-secondary': '#b5bac1',
            accent: '#FF6F00',
            'accent-hover': '#e56500',
            'accent-dim': 'rgba(255,111,0,0.15)',
            border: '#3f4147',
            'border-light': '#404249',
            input: '#1e1f22',
            destructive: '#f23f43',
            success: '#23a559',
            discord: {
              blurple: '#5865f2',
              dark: '#2b2d31',
              text: '#dcddde',
              link: '#00a8fc',
            },
          },
          borderRadius: {
            lg: '8px',
            md: '6px',
            sm: '4px',
          },
          fontFamily: {
            brand: ['Orbitron', 'sans-serif'],
          },
          boxShadow: {
            'card': '0 2px 8px rgba(0,0,0,0.25)',
            'card-hover': '0 4px 16px rgba(0,0,0,0.35)',
            'glow-accent': '0 0 20px rgba(255,111,0,0.15)',
            'sidebar': '4px 0 12px rgba(0,0,0,0.3)',
            'login': '0 8px 32px rgba(0,0,0,0.5)',
          },
        },
      },
    }
  </script>

  <!-- Shoelace CSS + JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

  <!-- Orbitron font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <!-- Discord preview styles -->
  <link rel="stylesheet" href="/css/discord-preview.css">

  <!-- Import map for Preact + HTM -->
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10",
      "preact/hooks": "https://esm.sh/preact@10/hooks",
      "htm/preact": "https://esm.sh/htm@3/preact",
      "preact-router": "https://esm.sh/preact-router@4"
    }
  }
  </script>

  <style>
    /* Base resets */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1f22;
      color: #f2f3f5;
      line-height: 1.5;
    }
    a { color: #FF6F00; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav a, nav a:hover { text-decoration: none; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1e1f22; }
    ::-webkit-scrollbar-thumb { background: #404249; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4e5058; }

    /* ── Shoelace deep theme overrides ── */
    :root {
      --sl-color-primary-50: rgba(255,111,0,0.08);
      --sl-color-primary-100: rgba(255,111,0,0.15);
      --sl-color-primary-200: rgba(255,111,0,0.25);
      --sl-color-primary-300: #ff9e40;
      --sl-color-primary-400: #ff8c33;
      --sl-color-primary-500: #ff7a1a;
      --sl-color-primary-600: #FF6F00;
      --sl-color-primary-700: #e56500;
      --sl-color-primary-800: #cc5a00;
      --sl-color-primary-900: #994300;
      --sl-color-primary-950: #662d00;

      --sl-color-danger-600: #f23f43;
      --sl-color-success-600: #23a559;

      --sl-input-background-color: #1e1f22;
      --sl-input-background-color-hover: #1e1f22;
      --sl-input-background-color-focus: #1e1f22;
      --sl-input-border-color: #3f4147;
      --sl-input-border-color-hover: #4e5058;
      --sl-input-border-color-focus: #FF6F00;
      --sl-input-color: #f2f3f5;
      --sl-input-placeholder-color: #6d6f78;
      --sl-input-focus-ring-color: rgba(255, 111, 0, 0.33);
      --sl-input-border-radius-medium: 4px;
      --sl-input-border-radius-small: 4px;
      --sl-input-height-medium: 40px;
      --sl-input-height-small: 32px;

      --sl-panel-background-color: #313338;
      --sl-panel-border-color: #3f4147;
      --sl-overlay-background-color: rgba(0,0,0,0.6);

      --sl-border-radius-medium: 4px;
      --sl-border-radius-large: 8px;

      --sl-font-size-medium: 14px;
      --sl-font-size-small: 13px;

      --sl-spacing-small: 8px;
      --sl-spacing-medium: 12px;

      --sl-input-spacing-small: 10px;
      --sl-input-spacing-medium: 14px;
    }

    /* Input/select/textarea base */
    sl-input::part(base), sl-select::part(combobox), sl-textarea::part(base) {
      background: #1e1f22;
      border-color: #3f4147;
      color: #f2f3f5;
      border-radius: 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    sl-input::part(base):hover, sl-select::part(combobox):hover, sl-textarea::part(base):hover {
      border-color: #4e5058;
    }
    sl-input::part(base):focus-within, sl-select::part(combobox):focus-within, sl-textarea::part(base):focus-within {
      border-color: #FF6F00;
      box-shadow: 0 0 0 3px rgba(255, 111, 0, 0.2);
    }
    sl-input::part(input), sl-textarea::part(textarea) {
      color: #f2f3f5;
      padding: 0 14px;
    }
    sl-textarea::part(textarea) {
      padding: 10px 14px;
    }
    sl-select::part(display-input) {
      padding: 0 14px;
    }
    sl-input::part(input)::placeholder, sl-textarea::part(textarea)::placeholder {
      color: #6d6f78;
    }

    /* Select dropdown */
    sl-select::part(listbox) {
      background: #2b2d31;
      border: 1px solid #3f4147;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    sl-option::part(base) { color: #f2f3f5; }
    sl-option::part(base):hover { background: #383a40; }
    sl-option[aria-selected="true"]::part(base) {
      background: rgba(255,111,0,0.15);
      color: #FF6F00;
    }

    /* Switch */
    sl-switch { --width: 40px; --height: 22px; --thumb-size: 16px; }
    sl-switch::part(control) { background: #404249; border: none; }
    sl-switch[checked]::part(control) { background: #FF6F00; border: none; }

    /* Buttons */
    sl-button[variant="primary"]::part(base) {
      background: #FF6F00;
      border-color: #FF6F00;
      color: #fff;
      font-weight: 500;
      transition: background 0.15s, box-shadow 0.15s;
    }
    sl-button[variant="primary"]::part(base):hover {
      background: #e56500;
      border-color: #e56500;
    }
    sl-button[variant="primary"]::part(base):active {
      background: #cc5a00;
    }
    sl-button[variant="default"]::part(base) {
      background: #404249;
      border-color: #404249;
      color: #b5bac1;
      font-weight: 500;
    }
    sl-button[variant="default"]::part(base):hover {
      background: #4e5058;
      border-color: #4e5058;
      color: #f2f3f5;
    }
    sl-button[variant="danger"]::part(base) {
      background: #f23f43;
      border-color: #f23f43;
      color: #fff;
    }
    sl-button[variant="danger"]::part(base):hover {
      background: #d83639;
    }

    /* Alerts */
    sl-alert::part(base) {
      border-radius: 4px;
      border: none;
    }
    sl-alert[variant="success"]::part(base) {
      background: rgba(35,165,89,0.12);
      color: #23a559;
    }
    sl-alert[variant="danger"]::part(base) {
      background: rgba(242,63,67,0.12);
      color: #f23f43;
    }

    /* Color picker */
    sl-color-picker::part(trigger) {
      border-color: #3f4147;
      border-radius: 4px;
    }

    /* Spinner */
    sl-spinner { --indicator-color: #FF6F00; --track-color: #3f4147; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
